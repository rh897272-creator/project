<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a,#000);
  color:#fff;
}

/* ====== HEADER ====== */
.topbar{
  padding:25px 20px;
  text-align:center;
  background:linear-gradient(135deg,#000,#111,#000);
  box-shadow:0 5px 30px rgba(0,0,0,0.8);
}

.logo{
  font-size:28px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  background:linear-gradient(90deg,#ffd700,#ffae00,#ffd700);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.logo span{
  background:linear-gradient(90deg,#ffffff,#ffd700);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.crown{
  color:#ffd700;
  margin-left:8px;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 5px #ffd700; }
to{ text-shadow:0 0 20px #ffcc00; }
}

/* ====== ADS FADE ====== */
.ads-container{
  width:95%;
  height:180px;
  margin:20px auto;
  position:relative;
  overflow:hidden;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

.ads-container img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 0.7s ease-in-out;
}

.ads-container img.active{
  opacity:1;
}

/* ====== CONTENT ====== */
.content{
  padding:20px;
  padding-bottom:100px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
  transition:0.3s;
}

.card h3{
  margin:0 0 10px;
  color:#ffd700;
}

.card p{
  margin:0;
  font-size:18px;
  font-weight:bold;
}

/* ====== BOTTOM NAV ====== */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.95);
  display:flex;
  justify-content:space-around;
  padding:15px 0;
  box-shadow:0 -5px 25px rgba(0,0,0,0.8);
}

.bottom-nav button{
  background:none;
  border:none;
  color:#fff;
  font-size:22px;
  cursor:pointer;
  transition:0.3s;
}

.bottom-nav button:hover{
  color:#ffd700;
  transform:scale(1.2);
}
</style>
</head>

<style>
.vp-btn{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(145deg,#111,#222);
  color:#00ff00;
  font-weight:bold;

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// إعداد Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBiQ4dHe4sbKDIrsyF8WdpjV3sY4qAxU4E",
  authDomain: "osim-d1821.firebaseapp.com",
  projectId: "osim-d1821",
  storageBucket: "osim-d1821.firebasestorage.app",
  messagingSenderId: "464951343183",
  appId: "1:464951343183:web:21c7615a90e4f38385923a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// العناصر
const giftBtn = document.getElementById("giftBtn");
const giftPopup = document.getElementById("giftPopup");
const closeGift = document.getElementById("closeGift");
const submitGift = document.getElementById("submitGift");
const giftCodeInput = document.getElementById("giftCode");
const giftStatus = document.getElementById("giftStatus");
const balanceBox = document.getElementById("balanceBox");

let uid = null;

// فتح وإغلاق popup
giftBtn.onclick = () => {
  giftPopup.style.display = "block"; 
  giftStatus.textContent = ""; 
  giftCodeInput.value = "";
}
closeGift.onclick = () => { giftPopup.style.display = "none"; }

// التأكد من تسجيل الدخول
onAuthStateChanged(auth, user=>{
  if(!user){ 
    window.location.href = "login.html"; 
    return; 
  }
  uid = user.uid;
});

// التحقق من الرمز وربطه بـ Firebase
submitGift.onclick = async () => {
  const code = giftCodeInput.value.trim().toUpperCase();
  if(!code){ giftStatus.textContent="❌ أدخل رمز صحيح"; return; }
  if(!uid){ giftStatus.textContent="❌ تسجيل الدخول مطلوب"; return; }

  // البحث عن الرمز في مجموعة giftCodes
  const q = query(collection(db,"giftCodes"), where("code","==",code));
  const querySnap = await getDocs(q);

  if(querySnap.empty){
    giftStatus.textContent = "❌ الرمز غير صالح";
    return;
  }

  const giftDoc = querySnap.docs[0];
  const giftData = giftDoc.data();

  // التأكد من عدم تجاوز عدد المستخدمين المسموح
  const usedBy = giftData.usedBy || [];
  const maxUsers = giftData.maxUsers || 1;

  if(usedBy.includes(uid)){
    giftStatus.textContent = "❌ لقد استخدمت هذا الرمز مسبقاً";
    return;
  }
  if(usedBy.length >= maxUsers){
    giftStatus.textContent = "❌ هذا الرمز انتهت صلاحيته";
    return;
  }

  // إضافة الرصيد للمستخدم
  const value = Number(giftData.amount || giftData.amount50 || 0);
  const userRef = doc(db,"users",uid);
  const userSnap = await getDoc(userRef);
  let balance = 0;
  if(userSnap.exists()){
    balance = userSnap.data().balance || 0;
  }
  const newBalance = balance + value;

  // تحديث رصيد المستخدم
  await updateDoc(userRef,{ balance: newBalance });

  // تحديث قائمة المستخدمين الذين استخدموا الرمز
  usedBy.push(uid);
  await updateDoc(doc(db,"giftCodes",giftDoc.id),{ usedBy });

  // تحديث واجهة المستخدم
  balanceBox.textContent = newBalance;
  giftStatus.textContent = `✅ تم إضافة ${value} دج إلى رصيدك`;
  giftCodeInput.value = "";
};
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

// إعداد Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBiQ4dHe4sbKDIrsyF8WdpjV3sY4qAxU4E",
  authDomain: "osim-d1821.firebaseapp.com",
  projectId: "osim-d1821",
  storageBucket: "osim-d1821.firebasestorage.app",
  messagingSenderId: "464951343183",
  appId: "1:464951343183:web:21c7615a90e4f38385923a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const balanceBox = document.getElementById("balanceBox");

// التحقق من حالة تسجيل الدخول
onAuthStateChanged(auth, async (user) => {
  if(user){
    // المستخدم مسجل دخول، نجيب بياناته
    const userSnap = await getDoc(doc(db,"users",user.uid));
    if(userSnap.exists()){
      const data = userSnap.data();
      balanceBox.textContent = (data.balance || 0) + " دج";
      // ممكن تضيف المستوى والعمليات بنفس الطريقة
      document.querySelector(".content .card:nth-child(2) p").textContent = "VIP " + (data.level || 0);
      document.querySelector(".content .card:nth-child(3) p").textContent = (data.latestOperations || "لا توجد عمليات حالياً");
    }
  }else{
    // المستخدم غير مسجل دخول
    alert("❌ الرجاء تسجيل الدخول أولاً");
    window.location.href = "login.html"; // تحويل لصفحة تسجيل الدخول
  }
});
</script>
